---
- name: Install pyenv build dependencies
  apt:
    name:
      - make
      - build-essential
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - wget
      - curl
      - llvm
      - libncursesw5-dev
      - xz-utils
      - tk-dev
      - libxml2-dev
      - libxmlsec1-dev
      - libffi-dev
      - liblzma-dev
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Get target user home directory
  getent:
    database: passwd
    key: "{{ target_user }}"
  register: target_user_info

- name: Set user home fact
  set_fact:
    target_user_home: "{{ target_user_info.ansible_facts.getent_passwd[target_user][4] }}"

- name: Check if pyenv is already installed
  stat:
    path: "{{ target_user_home }}/.pyenv/bin/pyenv"
  register: pyenv_dir

- name: Clone pyenv repository
  git:
    repo: https://github.com/pyenv/pyenv.git
    dest: "{{ target_user_home }}/.pyenv"
    version: "{{ pyenv_version }}"
  become: true
  become_user: "{{ target_user }}"
  when: not pyenv_dir.stat.exists

- name: Add pyenv to shell profile
  blockinfile:
    path: "{{ target_user_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED - pyenv"
    block: |
      export PYENV_ROOT="$HOME/.pyenv"
      [[ -d $PYENV_ROOT/bin ]] && export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init -)"
  become: true
  become_user: "{{ target_user }}"

- name: Check if zshrc exists
  stat:
    path: "{{ target_user_home }}/.zshrc"
  register: pyenv_zshrc

- name: Add pyenv to zsh profile (if zsh exists)
  blockinfile:
    path: "{{ target_user_home }}/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED - pyenv"
    block: |
      export PYENV_ROOT="$HOME/.pyenv"
      [[ -d $PYENV_ROOT/bin ]] && export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init -)"
  become: true
  become_user: "{{ target_user }}"
  when: pyenv_zshrc.stat.exists

- name: Check if Python version is already installed
  shell: |
    export PYENV_ROOT="{{ target_user_home }}/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"
    pyenv versions --bare | grep -q '^{{ python_version }}'
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  register: python_installed
  changed_when: false
  failed_when: false

- name: Install Python version via pyenv
  shell: |
    export PYENV_ROOT="{{ target_user_home }}/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"
    pyenv install -s {{ python_version }}
    pyenv global {{ python_version }}
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  when: python_installed.rc != 0
