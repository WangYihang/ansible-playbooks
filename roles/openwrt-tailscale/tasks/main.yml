---
# ── Preflight ────────────────────────────────────────────────
- name: Ensure target is OpenWrt
  assert:
    that:
      - ansible_facts['os_family'] | default('') | lower == 'openwrt'
        or ansible_facts['distribution'] | default('') | lower == 'openwrt'
    fail_msg: "This role is designed for OpenWrt only"
  tags: [preflight]

# ── Resolve architecture ─────────────────────────────────────
- name: Map architecture to Tailscale arch string
  set_fact:
    _ts_arch: >-
      {{ openwrt_tailscale_arch
         | default(_ts_arch_map[ansible_architecture] | default(ansible_architecture), true) }}
  vars:
    _ts_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: arm
      armhf: arm
      mips: mips
      mipsel: mipsle
      mips64el: mipsle
      riscv64: riscv64
  tags: [install]

- name: Set tarball filename and URL
  set_fact:
    _ts_tarball: "tailscale_{{ openwrt_tailscale_version }}_{{ _ts_arch | trim }}.tgz"
    _ts_url: "{{ openwrt_tailscale_base_url }}/tailscale_{{ openwrt_tailscale_version }}_{{ _ts_arch | trim }}.tgz"
    _ts_extract_dir: "tailscale_{{ openwrt_tailscale_version }}_{{ _ts_arch | trim }}"
  tags: [install]

# ── Check current version ────────────────────────────────────
- name: Check installed tailscale version
  command: tailscale version
  register: _ts_installed_version
  changed_when: false
  failed_when: false
  tags: [install]

- name: Determine if install/upgrade is needed
  set_fact:
    _ts_needs_install: >-
      {{ _ts_installed_version.rc != 0 or
         openwrt_tailscale_version not in (_ts_installed_version.stdout | default('')) }}
  tags: [install]

# ── Download and install ─────────────────────────────────────
- name: Create temp directory
  file:
    path: /tmp/tailscale-install
    state: directory
    mode: '0755'
  when: _ts_needs_install | bool
  tags: [install]

- name: Download Tailscale static tarball
  get_url:
    url: "{{ _ts_url }}"
    dest: "/tmp/tailscale-install/{{ _ts_tarball }}"
    mode: '0644'
  when: _ts_needs_install | bool
  tags: [install]

- name: Extract tarball
  command: tar xzf /tmp/tailscale-install/{{ _ts_tarball }} -C /tmp/tailscale-install
  args:
    creates: "/tmp/tailscale-install/{{ _ts_extract_dir }}/tailscale"
  when: _ts_needs_install | bool
  tags: [install]

- name: Stop tailscale before replacing binaries
  command: /etc/init.d/tailscale stop
  failed_when: false
  when: _ts_needs_install | bool
  tags: [install]

- name: Install tailscale binary
  copy:
    src: "/tmp/tailscale-install/{{ _ts_extract_dir }}/tailscale"
    dest: "{{ openwrt_tailscale_bin_dir }}/tailscale"
    mode: '0755'
    remote_src: true
  when: _ts_needs_install | bool
  tags: [install]

- name: Install tailscaled binary
  copy:
    src: "/tmp/tailscale-install/{{ _ts_extract_dir }}/tailscaled"
    dest: "{{ openwrt_tailscale_sbin_dir }}/tailscaled"
    mode: '0755'
    remote_src: true
  when: _ts_needs_install | bool
  tags: [install]

- name: Clean up temp directory
  file:
    path: /tmp/tailscale-install
    state: absent
  when: _ts_needs_install | bool
  tags: [install]

# ── IP forwarding (subnet router / exit node) ───────────────
- name: Check current IPv4 forwarding
  command: sysctl -n net.ipv4.ip_forward
  register: _ts_ipv4_fwd
  changed_when: false
  failed_when: false
  when: openwrt_tailscale_ip_forward
  tags: [forwarding]

- name: Enable IPv4 forwarding
  shell: |
    sysctl -w net.ipv4.ip_forward=1
    grep -q '^net.ipv4.ip_forward' /etc/sysctl.conf 2>/dev/null \
      && sed -i 's/^net.ipv4.ip_forward.*/net.ipv4.ip_forward=1/' /etc/sysctl.conf \
      || echo 'net.ipv4.ip_forward=1' >> /etc/sysctl.conf
  when: openwrt_tailscale_ip_forward and (_ts_ipv4_fwd.stdout | default('') | trim) != '1'
  tags: [forwarding]

- name: Check current IPv6 forwarding
  command: sysctl -n net.ipv6.conf.all.forwarding
  register: _ts_ipv6_fwd
  changed_when: false
  failed_when: false
  when: openwrt_tailscale_ip_forward
  tags: [forwarding]

- name: Enable IPv6 forwarding
  shell: |
    sysctl -w net.ipv6.conf.all.forwarding=1
    grep -q '^net.ipv6.conf.all.forwarding' /etc/sysctl.conf 2>/dev/null \
      && sed -i 's/^net.ipv6.conf.all.forwarding.*/net.ipv6.conf.all.forwarding=1/' /etc/sysctl.conf \
      || echo 'net.ipv6.conf.all.forwarding=1' >> /etc/sysctl.conf
  when: openwrt_tailscale_ip_forward and (_ts_ipv6_fwd.stdout | default('') | trim) != '1'
  tags: [forwarding]

# NOTE: ethtool UDP GRO optimisation is skipped on OpenWrt.
# Most OpenWrt devices use network drivers that do not support
# rx-udp-gro-forwarding, and ethtool is usually not available.

# ── Firewall ─────────────────────────────────────────────────
# NOTE: If you change openwrt_tailscale_port after the rule is created,
# delete the old rule manually: uci delete firewall.@rule[N] && uci commit firewall
- name: Check if Tailscale firewall rule already exists
  shell: uci show firewall | grep "name='Allow-Tailscale'"
  register: _ts_fw_check
  changed_when: false
  failed_when: false
  when: openwrt_tailscale_firewall
  tags: [firewall]

- name: Add Tailscale firewall rule
  shell: |
    uci add firewall rule
    uci set firewall.@rule[-1].name='Allow-Tailscale'
    uci set firewall.@rule[-1].src='wan'
    uci set firewall.@rule[-1].proto='udp'
    uci set firewall.@rule[-1].dest_port='{{ openwrt_tailscale_port }}'
    uci set firewall.@rule[-1].target='ACCEPT'
    uci commit firewall
  when: openwrt_tailscale_firewall and _ts_fw_check.rc != 0
  notify: Restart firewall on openwrt
  tags: [firewall]

# ── Init script ──────────────────────────────────────────────
- name: Deploy OpenWrt init script for tailscale
  copy:
    dest: /etc/init.d/tailscale
    mode: '0755'
    content: |
      #!/bin/sh /etc/rc.common

      START=99
      STOP=01

      USE_PROCD=1

      start_service() {
        mkdir -p {{ openwrt_tailscale_state_dir }}

        procd_open_instance
        procd_set_param command {{ openwrt_tailscale_sbin_dir }}/tailscaled

        # Set the port to listen on for incoming VPN packets.
        procd_append_param command --port {{ openwrt_tailscale_port }}

        # Persist state across reboots
        procd_append_param command --state {{ openwrt_tailscale_state_dir }}/tailscaled.state
      {% if openwrt_tailscale_userspace_networking %}

        # OpenWrt uses its own firewall, use userspace networking
        procd_append_param command --tun userspace-networking
      {% endif %}

        procd_set_param respawn
        procd_set_param stdout 1
        procd_set_param stderr 1

        procd_close_instance
      }

      stop_service() {
        {{ openwrt_tailscale_bin_dir }}/tailscale down
      }
  notify: Restart tailscale on openwrt
  tags: [init]

# ── Enable and start ─────────────────────────────────────────
- name: Check if tailscale init script is enabled
  shell: ls /etc/rc.d/S*tailscale 2>/dev/null
  register: _ts_enabled_check
  changed_when: false
  failed_when: false
  tags: [service]

- name: Enable tailscale init script
  command: /etc/init.d/tailscale enable
  when: _ts_enabled_check.rc != 0
  tags: [service]

- name: Ensure tailscale service is running
  shell: |
    if /etc/init.d/tailscale status 2>&1 | grep -q 'running'; then
      echo 'already running'
    else
      /etc/init.d/tailscale start
      echo 'started'
    fi
  register: _ts_start_result
  changed_when: "'started' in _ts_start_result.stdout"
  tags: [service]

- name: Wait for tailscaled to be ready
  command: tailscale status --json
  register: _ts_status
  retries: 10
  delay: 2
  until: _ts_status.rc == 0
  changed_when: false
  failed_when: false
  tags: [service]

# ── tailscale up (only if already authenticated) ─────────────
- name: Determine authentication state
  set_fact:
    _ts_backend_state: "{{ (_ts_status.stdout | from_json).BackendState | default('') }}"
  when: _ts_status.rc == 0
  tags: [connect]

- name: Set authentication state (daemon not ready)
  set_fact:
    _ts_backend_state: "Unknown"
  when: _ts_status.rc != 0
  tags: [connect]

- name: Build tailscale up command
  set_fact:
    _ts_up_cmd: >-
      tailscale up
      {{ '--accept-routes' if openwrt_tailscale_accept_routes else '' }}
      {{ '--advertise-exit-node' if openwrt_tailscale_advertise_exit_node else '' }}
      {{ '--advertise-routes=' + openwrt_tailscale_advertise_routes if openwrt_tailscale_advertise_routes else '' }}
  when: _ts_backend_state != 'Running'
  tags: [connect]

- name: Run tailscale up (already authenticated)
  command: "{{ _ts_up_cmd }}"
  when: _ts_backend_state not in ['Running', 'NeedsLogin', 'Unknown']
  register: _ts_up_result
  changed_when: _ts_up_result.rc == 0
  failed_when: false
  tags: [connect]

- name: Show tailscale up output
  debug:
    msg: "{{ _ts_up_result.stdout_lines | default([]) + _ts_up_result.stderr_lines | default([]) }}"
  when: _ts_up_result is defined and _ts_up_result is not skipped and (_ts_up_result is changed or (_ts_up_result.rc | default(0)) != 0)
  tags: [connect]

- name: Notify user — first-time authentication required
  debug:
    msg: >-
      Tailscale is not authenticated yet. Please SSH into the router and run:
        tailscale up
      Then follow the URL to complete authentication in your browser.
  when: _ts_backend_state == 'NeedsLogin'
  tags: [connect]

# ── Verify ───────────────────────────────────────────────────
- name: Verify tailscale version after install
  command: tailscale version
  register: _ts_final_version
  changed_when: false
  tags: [verify]

- name: Show installed version
  debug:
    msg: "Tailscale version: {{ _ts_final_version.stdout_lines[0] | default('unknown') }}"
  tags: [verify]
