---
- name: Install phpenv build dependencies
  apt:
    name:
      - curl
      - git
      - make
      - build-essential
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - libxml2-dev
      - libcurl4-openssl-dev
      - libonig-dev
      - libzip-dev
      - libpng-dev
      - libjpeg-dev
      - libfreetype6-dev
      - re2c
      - autoconf
      - bison
      - pkg-config
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Get target user home directory
  getent:
    database: passwd
    key: "{{ target_user }}"
  register: target_user_info

- name: Set user home fact
  set_fact:
    target_user_home: "{{ target_user_info.ansible_facts.getent_passwd[target_user][4] }}"

- name: Check if phpenv is already installed
  stat:
    path: "{{ target_user_home }}/.phpenv/bin/phpenv"
  register: phpenv_dir

- name: Clone phpenv repository
  git:
    repo: https://github.com/phpenv/phpenv.git
    dest: "{{ target_user_home }}/.phpenv"
  become: true
  become_user: "{{ target_user }}"
  when: not phpenv_dir.stat.exists

- name: Clone php-build plugin
  git:
    repo: https://github.com/php-build/php-build.git
    dest: "{{ target_user_home }}/.phpenv/plugins/php-build"
  become: true
  become_user: "{{ target_user }}"
  when: not phpenv_dir.stat.exists

- name: Add phpenv to shell profile
  blockinfile:
    path: "{{ target_user_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED - phpenv"
    block: |
      export PHPENV_ROOT="$HOME/.phpenv"
      [[ -d $PHPENV_ROOT/bin ]] && export PATH="$PHPENV_ROOT/bin:$PATH"
      eval "$(phpenv init -)"
  become: true
  become_user: "{{ target_user }}"

- name: Check if zshrc exists
  stat:
    path: "{{ target_user_home }}/.zshrc"
  register: phpenv_zshrc

- name: Add phpenv to zsh profile (if zsh exists)
  blockinfile:
    path: "{{ target_user_home }}/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED - phpenv"
    block: |
      export PHPENV_ROOT="$HOME/.phpenv"
      [[ -d $PHPENV_ROOT/bin ]] && export PATH="$PHPENV_ROOT/bin:$PATH"
      eval "$(phpenv init -)"
  become: true
  become_user: "{{ target_user }}"
  when: phpenv_zshrc.stat.exists

- name: Install PHP version via phpenv
  shell: |
    export PHPENV_ROOT="{{ target_user_home }}/.phpenv"
    export PATH="$PHPENV_ROOT/bin:$PATH"
    eval "$(phpenv init -)"
    phpenv install -s {{ php_version }}
    phpenv global {{ php_version }}
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
