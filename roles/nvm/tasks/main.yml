---
- name: Check if nvm is already installed
  stat:
    path: "{{ '~' + target_user }}/.nvm/nvm.sh"
  register: nvm_dir

- name: Download nvm install script
  get_url:
    url: "https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh"
    dest: /tmp/install_nvm.sh
    mode: '0755'
  when: not nvm_dir.stat.exists

- name: Install nvm
  shell: bash /tmp/install_nvm.sh
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "{{ '~' + target_user }}"
  when: not nvm_dir.stat.exists

- name: Check if Node.js version is already installed
  shell: |
    export NVM_DIR="{{ '~' + target_user }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    if [ "{{ nodejs_version }}" = "--lts" ]; then
      nvm ls --no-colors lts/* 2>/dev/null | grep -qv 'N/A'
    else
      nvm ls {{ nodejs_version }} 2>/dev/null | grep -q '{{ nodejs_version }}'
    fi
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  register: nodejs_installed
  changed_when: false
  failed_when: false

- name: Install Node.js via nvm
  shell: |
    export NVM_DIR="{{ '~' + target_user }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm install {{ nodejs_version }}
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  when: nodejs_installed.rc != 0

- name: Clean up install script
  file:
    path: /tmp/install_nvm.sh
    state: absent
