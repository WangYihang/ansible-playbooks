---
- name: Install gvm dependencies
  apt:
    name:
      - curl
      - git
      - mercurial
      - make
      - binutils
      - bison
      - gcc
      - build-essential
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Check if gvm is already installed
  stat:
    path: "{{ '~' + target_user }}/.gvm/scripts/gvm"
  register: gvm_dir

- name: Download gvm install script
  get_url:
    url: https://raw.githubusercontent.com/moovweb/gvm/master/binscripts/gvm-installer
    dest: /tmp/install_gvm.sh
    mode: '0755'
  when: not gvm_dir.stat.exists

- name: Install gvm
  shell: bash /tmp/install_gvm.sh
  become: true
  become_user: "{{ target_user }}"
  when: not gvm_dir.stat.exists

- name: Check if Go version is already installed
  shell: |
    source {{ '~' + target_user }}/.gvm/scripts/gvm
    gvm list | grep -q '{{ go_version }}'
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  register: go_installed
  changed_when: false
  failed_when: false

- name: Install Go version via gvm (bootstrap with system go)
  shell: |
    source {{ '~' + target_user }}/.gvm/scripts/gvm
    gvm install {{ go_version }} -B
    gvm use {{ go_version }} --default
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  when: go_installed.rc != 0

- name: Clean up install script
  file:
    path: /tmp/install_gvm.sh
    state: absent
