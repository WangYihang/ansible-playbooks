---
- name: Get target user home directory
  getent:
    database: passwd
    key: "{{ target_user }}"
  register: target_user_info

- name: Set user home fact
  set_fact:
    target_user_home: "{{ target_user_info.ansible_facts.getent_passwd[target_user][4] }}"

- name: Check if Oh My Zsh is already installed
  stat:
    path: "{{ target_user_home }}/.oh-my-zsh"
  register: oh_my_zsh_dir

- name: Download Oh My Zsh installation script
  get_url:
    url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
    dest: /tmp/install_ohmyzsh.sh
    mode: '0755'
  when: not oh_my_zsh_dir.stat.exists

- name: Run Oh My Zsh installation (unattended)
  shell: sh /tmp/install_ohmyzsh.sh --unattended
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "{{ target_user_home }}"
  when: not oh_my_zsh_dir.stat.exists

- name: Clean up Oh My Zsh install script
  file:
    path: /tmp/install_ohmyzsh.sh
    state: absent

- name: Set Oh My Zsh theme
  lineinfile:
    path: "{{ target_user_home }}/.zshrc"
    regexp: '^ZSH_THEME='
    line: 'ZSH_THEME="{{ zsh_theme }}"'
  become: true
  become_user: "{{ target_user }}"

- name: Change default shell to zsh
  user:
    name: "{{ target_user }}"
    shell: /bin/zsh
